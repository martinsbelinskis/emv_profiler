name: Build Executables

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: EMV-Profiler-Windows
            exe: dist/emv_profiler.exe
            extra_deps: ""
          - os: ubuntu-latest
            artifact: EMV-Profiler-Ubuntu
            exe: dist/emv_profiler
            extra_deps: |
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends \
                libxcb-cursor0 libxcb-xinerama0 libxcb-randr0 \
                libxcb-shape0 libxcb-icccm4 libxcb-keysyms1 \
                libxcb-image0 libxcb-render-util0 \
                libgl1 libegl1 libdbus-1-3 \
                libxkbcommon-x11-0 libglib2.0-0 \
                xvfb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: ${{ matrix.extra_deps }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 click pyinstaller

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller emv_profiler.spec --noconfirm

      - name: Build with PyInstaller (Ubuntu)
        if: runner.os == 'Linux'
        run: xvfb-run pyinstaller emv_profiler.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.exe }}
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.exe }}
          generate_release_notes: true
